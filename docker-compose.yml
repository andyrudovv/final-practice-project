services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: doctemplate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: builder
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/doctemplate?schema=public"
    depends_on:
      db:
        condition: service_healthy
    command: npx prisma db push
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/doctemplate?schema=public"
      NEXTAUTH_SECRET: "change-me-to-a-secure-random-string"
      NEXTAUTH_URL: "http://localhost:3000"
      AUTH_TRUST_HOST: "true"
      SMTP_USER: "andy.rudovv@gmail.com"
      SMTP_PASS: "xlbc htwl mauu jkgg"
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata: